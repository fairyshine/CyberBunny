<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        textarea { width: 100%; height: 100px; margin: 10px 0; }
        input { width: 100%; padding: 8px; margin: 5px 0; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; white-space: pre-wrap; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>🐰 WebAgent API 测试</h1>
    
    <h3>配置</h3>
    <input type="password" id="apiKey" placeholder="输入 OpenAI API Key">
    <input type="text" id="baseUrl" value="/api/openai" placeholder="API 基础 URL (默认用代理)">
    <input type="text" id="model" value="gpt-4" placeholder="模型名称">
    
    <h3>测试消息</h3>
    <textarea id="message">你好！请简单介绍一下自己。</textarea>
    <button onclick="testAPI()">发送测试请求</button>
    
    <h3>结果</h3>
    <pre id="result">等待测试...</pre>

    <script>
        async function testAPI() {
            const resultEl = document.getElementById('result');
            const apiKey = document.getElementById('apiKey').value.trim();
            const baseUrl = document.getElementById('baseUrl').value.trim() || '/api/openai';
            const model = document.getElementById('model').value.trim() || 'gpt-4';
            const message = document.getElementById('message').value.trim();
            
            if (!apiKey) {
                resultEl.innerHTML = '<span class="error">错误: 请输入 API Key</span>';
                return;
            }

            resultEl.textContent = '发送请求中...';
            
            try {
                const apiUrl = baseUrl.startsWith('http') 
                    ? `${baseUrl}/v1/chat/completions`
                    : `${baseUrl}/v1/chat/completions`;
                
                console.log('Sending request to:', apiUrl);
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`,
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: 'system', content: '你是一个有用的助手。' },
                            { role: 'user', content: message }
                        ],
                        stream: false,
                        temperature: 0.7,
                        max_tokens: 500,
                    }),
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);

                const responseText = await response.text();
                
                if (!response.ok) {
                    resultEl.innerHTML = `<span class="error">HTTP ${response.status} 错误:\n${responseText}</span>`;
                    return;
                }

                try {
                    const data = JSON.parse(responseText);
                    const content = data.choices?.[0]?.message?.content || '无回复内容';
                    resultEl.innerHTML = `<span class="success">成功!\n\n回复内容:\n${content}</span>`;
                } catch (e) {
                    resultEl.innerHTML = `<span class="error">解析响应失败:\n${responseText}</span>`;
                }
            } catch (error) {
                resultEl.innerHTML = `<span class="error">请求失败:\n${error.message}\n\n可能是 CORS 错误。检查浏览器控制台获取详细信息。</span>`;
                console.error('Full error:', error);
            }
        }
        
        // 页面加载时检查连接
        window.onload = () => {
            console.log('Test page loaded');
            fetch('/api/openai/v1/models', {
                headers: {
                    'Authorization': 'Bearer test'
                }
            }).then(r => {
                console.log('Proxy test:', r.status);
            }).catch(e => {
                console.log('Proxy test failed:', e.message);
            });
        };
    </script>
</body>
</html>
