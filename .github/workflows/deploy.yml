name: Deploy to GitHub Pages

on:
  # 在推送到 main 分支时触发部署
  push:
    branches: ['main']
    paths:
      - 'cyberbunny/**'
      - '.github/workflows/deploy.yml'

  # 允许手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限
defaults:
  run:
    working-directory: ./cyberbunny

permissions:
  contents: read
  pages: write
  id-token: write

# 防止并发部署
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './cyberbunny/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./cyberbunny/dist

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
