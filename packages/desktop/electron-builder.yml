appId: com.cyberbunny.desktop
productName: CyberBunny
directories:
  buildResources: build
  output: release
files:
  - dist
  - dist-electron
mac:
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
win:
  artifactName: ${productName}-${version}-setup.${ext}
  target:
    - target: nsis
      arch:
        - x64
linux:
  artifactName: ${productName}-${version}.${ext}
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
