<!DOCTYPE html>
<html>
<head>
  <title>vLLM 连接测试</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .input-group {
      margin: 10px 0;
    }
    label {
      display: block;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 8px;
      font-family: monospace;
    }
    button {
      padding: 10px 20px;
      margin: 10px 5px 10px 0;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 5px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h1>vLLM 连接测试工具</h1>

  <div class="input-group">
    <label>API Base URL:</label>
    <input type="text" id="baseUrl" placeholder="http://localhost:8000/v1" value="http://localhost:8000/v1">
  </div>

  <div class="input-group">
    <label>API Key (可选):</label>
    <input type="text" id="apiKey" placeholder="留空如果不需要">
  </div>

  <div class="input-group">
    <label>Model:</label>
    <input type="text" id="model" placeholder="gpt-3.5-turbo" value="gpt-3.5-turbo">
  </div>

  <button onclick="testConnection()">测试连接</button>
  <button onclick="testModels()">获取模型列表</button>

  <div id="result"></div>

  <script>
    const resultDiv = document.getElementById('result');

    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
      resultDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
    }

    function clearLog() {
      resultDiv.innerHTML = '';
    }

    async function testModels() {
      clearLog();
      const baseUrl = document.getElementById('baseUrl').value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();

      if (!baseUrl) {
        log('请输入 API Base URL', 'error');
        return;
      }

      const url = baseUrl.replace(/\/$/, '') + '/models';
      log(`正在请求: ${url}`);

      try {
        const headers = {
          'Content-Type': 'application/json',
        };
        if (apiKey) {
          headers['Authorization'] = `Bearer ${apiKey}`;
        }

        const response = await fetch(url, {
          method: 'GET',
          headers: headers,
        });

        log(`响应状态: ${response.status} ${response.statusText}`);

        if (!response.ok) {
          const errorText = await response.text();
          log(`错误响应: ${errorText}`, 'error');
          return;
        }

        const data = await response.json();
        log(`成功! 可用模型:`, 'success');
        log(JSON.stringify(data, null, 2));

      } catch (error) {
        log(`连接失败: ${error.message}`, 'error');
        log('可能的原因:', 'error');
        log('1. vLLM 服务器未运行', 'error');
        log('2. URL 配置错误', 'error');
        log('3. CORS 未配置 (需要添加 --allowed-origins "*")', 'error');
      }
    }

    async function testConnection() {
      clearLog();
      const baseUrl = document.getElementById('baseUrl').value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();
      const model = document.getElementById('model').value.trim();

      if (!baseUrl || !model) {
        log('请填写必填字段', 'error');
        return;
      }

      const url = baseUrl.replace(/\/$/, '') + '/chat/completions';
      log(`正在请求: ${url}`);
      log(`模型: ${model}`);

      try {
        const headers = {
          'Content-Type': 'application/json',
        };
        if (apiKey) {
          headers['Authorization'] = `Bearer ${apiKey}`;
        }

        const response = await fetch(url, {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({
            model: model,
            messages: [
              { role: 'user', content: 'Hello, this is a test.' }
            ],
            max_tokens: 50,
            stream: false,
          }),
        });

        log(`响应状态: ${response.status} ${response.statusText}`);

        if (!response.ok) {
          const errorText = await response.text();
          log(`错误响应: ${errorText}`, 'error');
          return;
        }

        const data = await response.json();
        log(`成功! 响应:`, 'success');
        log(JSON.stringify(data, null, 2));

      } catch (error) {
        log(`连接失败: ${error.message}`, 'error');
        log('可能的原因:', 'error');
        log('1. vLLM 服务器未运行', 'error');
        log('2. URL 配置错误', 'error');
        log('3. CORS 未配置 (需要添加 --allowed-origins "*")', 'error');
        log('4. 模型名称不正确', 'error');
      }
    }
  </script>
</body>
</html>
